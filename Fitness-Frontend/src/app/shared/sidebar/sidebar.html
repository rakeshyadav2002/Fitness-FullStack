<aside class="sidebar">
  <a class="sidebar-brand" routerLink="/dashboard">
    <span class="brand-mark">
      <i class="bi bi-activity"></i>
    </span>
    <span>
      <strong>FitTrack Pro</strong>
      <small>Fitness OS</small>
    </span>
  </a>

  <nav class="sidebar-nav" aria-label="Main navigation">
    <a
      routerLink="/dashboard"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }">
      <i class="bi bi-speedometer2"></i>
      Dashboard
    </a>

    <a routerLink="/dashboard/bmi" routerLinkActive="active">
      <i class="bi bi-heart-pulse"></i>
      BMI
    </a>

    <a routerLink="/dashboard/calories" routerLinkActive="active">
      <i class="bi bi-fire"></i>
      Calories
    </a>

    <a routerLink="/dashboard/dietplans" routerLinkActive="active">
      <i class="bi bi-card-checklist"></i>
      Diet Plans
    </a>

    <a routerLink="/dashboard/profile" routerLinkActive="active">
      <i class="bi bi-person-circle"></i>
      Profile
    </a>
  </nav>

  <div class="sidebar-footer">
    <span class="metric-chip">
      <i class="bi bi-lightning-charge"></i>
      Consistency wins
    </span>
  </div>
</aside>
