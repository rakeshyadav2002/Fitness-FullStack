<div class="container mt-4">

  <div class="card shadow p-4">

    <h2 class="mb-4">My Profile</h2>

    <table class="table table-bordered">

      <tr>
        <th>Name</th>
        <td>{{ user.name }}</td>
      </tr>

      <tr>
        <th>Email</th>
        <td>{{ user.email }}</td>
      </tr>

      <tr>
        <th>Age</th>
        <td>{{ user.age }}</td>
      </tr>

      <tr>
        <th>Gender</th>
        <td>{{ user.gender }}</td>
      </tr>

      <tr>
        <th>Height</th>
        <td>{{ user.height }} cm</td>
      </tr>

      <tr>
        <th>Weight</th>
        <td>{{ user.weight }} kg</td>
      </tr>

    </table>

  </div>

</div>
